services:
  frontend:
    build:
      context: ./apps/frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - api

  api:
    build:
      context: ./services/api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - mqtt
    environment:
      MQTT_ENABLED: ${MQTT_ENABLED:-true}
      MQTT_BROKER_HOST: mqtt
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT:-1883}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-labos-api}
      MQTT_TOPIC_PREFIX: ${MQTT_TOPIC_PREFIX:-labos}
      MQTT_PUBLISH_COMMANDS: ${MQTT_PUBLISH_COMMANDS:-true}
    volumes:
      - ./storage:/app/storage

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mqtt/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mqtt/data:/mosquitto/data
      - ./infra/mqtt/log:/mosquitto/log
